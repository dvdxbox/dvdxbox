<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小蜜蜂采蜜</title>
    <style>
      :root {
        --bg: #fef9c3;
        --panel: #ffffffcc;
        --text: #1f2937;
        --primary: #f59e0b;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Microsoft YaHei", system-ui, sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #fde68a, #fef3c7 45%, #fef9c3 100%);
      }

      .wrapper {
        width: min(92vw, 820px);
        display: grid;
        gap: 12px;
      }

      .hud {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--panel);
        border-radius: 10px;
        padding: 10px 14px;
        box-shadow: 0 8px 24px #00000014;
      }

      .title {
        font-weight: 700;
      }

      .tips {
        font-size: 14px;
        opacity: 0.8;
      }

      canvas {
        width: 100%;
        aspect-ratio: 4 / 3;
        border-radius: 14px;
        border: 3px solid #fbbf24;
        background: linear-gradient(#bae6fd 0 68%, #86efac 68% 100%);
        box-shadow: 0 10px 30px #0000001f;
      }

      .controls {
        display: flex;
        gap: 8px;
        justify-content: center;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font-size: 14px;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
        font-weight: 600;
      }

      button.secondary {
        background: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="wrapper">
      <div class="hud">
        <div>
          <div class="title">🐝 小蜜蜂采蜜大作战</div>
          <div class="tips">方向键 / WASD 移动，采到花朵得分，避开雨滴！</div>
        </div>
        <div id="stats">分数: 0 | 生命: 3 | 倒计时: 60</div>
      </div>
      <canvas id="game" width="800" height="600"></canvas>
      <div class="controls">
        <button id="startBtn">开始游戏</button>
        <button id="restartBtn" class="secondary">重新开始</button>
      </div>
    </div>

    <script>
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");
      const stats = document.getElementById("stats");
      const startBtn = document.getElementById("startBtn");
      const restartBtn = document.getElementById("restartBtn");

      const state = {
        running: false,
        score: 0,
        hp: 3,
        timeLeft: 60,
        bee: { x: 120, y: 520, r: 22, speed: 5 },
        flower: { x: 580, y: 470, r: 18 },
        raindrops: [],
        keys: new Set(),
        spawnTimer: 0,
        timerId: null,
        msg: "点击开始游戏",
      };

      function resetGame() {
        state.running = false;
        state.score = 0;
        state.hp = 3;
        state.timeLeft = 60;
        state.bee = { x: 120, y: 520, r: 22, speed: 5 };
        state.flower = randomFlower();
        state.raindrops = [];
        state.keys.clear();
        state.spawnTimer = 0;
        state.msg = "点击开始游戏";
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
        updateHud();
      }

      function randomFlower() {
        const margin = 40;
        return {
          x: margin + Math.random() * (canvas.width - margin * 2),
          y: margin + Math.random() * (canvas.height - 200),
          r: 18,
        };
      }

      function startGame() {
        if (state.running) return;
        state.running = true;
        state.msg = "快去采花吧！";
        if (state.timerId) clearInterval(state.timerId);
        state.timerId = setInterval(() => {
          state.timeLeft -= 1;
          if (state.timeLeft <= 0) {
            state.timeLeft = 0;
            endGame("时间到！");
          }
          updateHud();
        }, 1000);
      }

      function endGame(reason) {
        state.running = false;
        if (state.timerId) {
          clearInterval(state.timerId);
          state.timerId = null;
        }
        state.msg = `${reason} 最终得分：${state.score}`;
      }

      function updateHud() {
        stats.textContent = `分数: ${state.score} | 生命: ${state.hp} | 倒计时: ${state.timeLeft}`;
      }

      function dist(a, b) {
        return Math.hypot(a.x - b.x, a.y - b.y);
      }

      function spawnRaindrop() {
        state.raindrops.push({
          x: Math.random() * canvas.width,
          y: -10,
          vy: 2 + Math.random() * 3,
          r: 8,
        });
      }

      function update() {
        if (!state.running) return;

        const bee = state.bee;
        if (state.keys.has("ArrowLeft") || state.keys.has("a")) bee.x -= bee.speed;
        if (state.keys.has("ArrowRight") || state.keys.has("d")) bee.x += bee.speed;
        if (state.keys.has("ArrowUp") || state.keys.has("w")) bee.y -= bee.speed;
        if (state.keys.has("ArrowDown") || state.keys.has("s")) bee.y += bee.speed;

        bee.x = Math.max(bee.r, Math.min(canvas.width - bee.r, bee.x));
        bee.y = Math.max(bee.r, Math.min(canvas.height - bee.r, bee.y));

        if (dist(bee, state.flower) < bee.r + state.flower.r) {
          state.score += 10;
          state.flower = randomFlower();
          updateHud();
        }

        state.spawnTimer += 1;
        if (state.spawnTimer >= 25) {
          spawnRaindrop();
          state.spawnTimer = 0;
        }

        for (let i = state.raindrops.length - 1; i >= 0; i -= 1) {
          const drop = state.raindrops[i];
          drop.y += drop.vy;

          if (dist(drop, bee) < drop.r + bee.r - 6) {
            state.raindrops.splice(i, 1);
            state.hp -= 1;
            updateHud();
            if (state.hp <= 0) {
              endGame("生命耗尽！");
              return;
            }
            continue;
          }

          if (drop.y - drop.r > canvas.height) {
            state.raindrops.splice(i, 1);
          }
        }
      }

      function drawBee(x, y, r) {
        ctx.save();
        ctx.translate(x, y);

        ctx.fillStyle = "#fde047";
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "#111827";
        ctx.lineWidth = 4;
        for (const offset of [-10, 0, 10]) {
          ctx.beginPath();
          ctx.moveTo(offset, -r * 0.75);
          ctx.lineTo(offset, r * 0.75);
          ctx.stroke();
        }

        ctx.fillStyle = "#dbeafe";
        ctx.beginPath();
        ctx.ellipse(-r * 0.5, -r * 0.75, r * 0.6, r * 0.35, -0.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(r * 0.5, -r * 0.75, r * 0.6, r * 0.35, 0.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#111827";
        ctx.beginPath();
        ctx.arc(r * 0.45, -r * 0.1, 3, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawFlower({ x, y, r }) {
        ctx.save();
        ctx.translate(x, y);
        for (let i = 0; i < 6; i += 1) {
          ctx.rotate(Math.PI / 3);
          ctx.fillStyle = "#f472b6";
          ctx.beginPath();
          ctx.ellipse(0, r * 0.9, r * 0.45, r * 0.8, 0, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = "#facc15";
        ctx.beginPath();
        ctx.arc(0, 0, r * 0.6, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawRaindrop({ x, y, r }) {
        ctx.fillStyle = "#3b82f6";
        ctx.beginPath();
        ctx.moveTo(x, y - r);
        ctx.quadraticCurveTo(x + r, y, x, y + r * 1.4);
        ctx.quadraticCurveTo(x - r, y, x, y - r);
        ctx.fill();
      }

      function drawGround() {
        ctx.fillStyle = "#4ade80";
        ctx.fillRect(0, canvas.height - 100, canvas.width, 100);

        ctx.strokeStyle = "#22c55e";
        ctx.lineWidth = 2;
        for (let i = 0; i < canvas.width; i += 25) {
          ctx.beginPath();
          ctx.moveTo(i, canvas.height - 100);
          ctx.lineTo(i + 8, canvas.height - 115);
          ctx.stroke();
        }
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawGround();
        drawFlower(state.flower);
        for (const drop of state.raindrops) drawRaindrop(drop);
        drawBee(state.bee.x, state.bee.y, state.bee.r);

        if (!state.running) {
          ctx.fillStyle = "#111827cc";
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = "white";
          ctx.textAlign = "center";
          ctx.font = "bold 44px Microsoft YaHei";
          ctx.fillText("🐝 小蜜蜂", canvas.width / 2, canvas.height / 2 - 20);
          ctx.font = "24px Microsoft YaHei";
          ctx.fillText(state.msg, canvas.width / 2, canvas.height / 2 + 30);
        }
      }

      function loop() {
        update();
        render();
        requestAnimationFrame(loop);
      }

      window.addEventListener("keydown", (e) => {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        state.keys.add(key);
      });

      window.addEventListener("keyup", (e) => {
        const key = e.key.length === 1 ? e.key.toLowerCase() : e.key;
        state.keys.delete(key);
      });

      startBtn.addEventListener("click", startGame);
      restartBtn.addEventListener("click", () => {
        resetGame();
        startGame();
      });

      resetGame();
      loop();
    </script>
  </body>
</html>
